{
  "Dhcp4": {

    "interfaces-config": {
      "interfaces": [ "eth1" ]
    },

    "lease-database": {
      "type": "memfile",
      "persist": true,
      "name": "/var/lib/kea/dhcp4.leases"
    },

    "valid-lifetime": 7200,

    "subnet4": [
      {
        "id": 1,
		"subnet": "192.168.100.0/24",

        "pools": [
          {
            "pool": "192.168.100.100 - 192.168.100.200"
          }
        ],

        "option-data": [
          {
            "name": "routers",
            "data": "192.168.100.1"
          },
          {
            "name": "domain-name-servers",
            "data": "192.168.100.1, 192.168.100.2"
          },
          {
            "name": "domain-name",
            "data": "aa.lan"
          }
        ]
      }
    ]
  }
}
